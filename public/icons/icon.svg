<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 배경: 코랄 그라데이션 (대각선, 깊이감) -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#F7908B"/>
      <stop offset="40%" stop-color="#E8554E"/>
      <stop offset="100%" stop-color="#C43D38"/>
    </linearGradient>
    <!-- 상단 글로우 — 글래스모피즘 -->
    <radialGradient id="glow" cx="0.35" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- 컵: 순백 → 크림 -->
    <linearGradient id="cup" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0E8E6"/>
    </linearGradient>
    <!-- 커피 표면 -->
    <radialGradient id="latte" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#D4A68C"/>
      <stop offset="70%" stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#6B3F28"/>
    </radialGradient>
    <!-- 김 -->
    <linearGradient id="steam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- 데코: 큰 반투명 원 (토스/당근 스타일 배경 모션감) -->
  <circle cx="380" cy="120" r="100" fill="white" opacity="0.06"/>
  <circle cx="100" cy="420" r="130" fill="white" opacity="0.04"/>

  <!-- 접시 — 미니멀 반투명 -->
  <ellipse cx="248" cy="378" rx="115" ry="16" fill="white" opacity="0.2"/>

  <!-- 컵 바디 — 통통한 머그컵, 약간 왼쪽 배치 -->
  <rect x="156" y="204" width="184" height="172" rx="32" fill="url(#cup)"/>
  <!-- 컵 좌측 하이라이트 스트라이프 -->
  <rect x="170" y="220" width="28" height="80" rx="14" fill="white" opacity="0.5"/>

  <!-- 컵 핸들 -->
  <path d="M340 256 C380 256 398 290 398 312 C398 334 380 368 340 368"
        fill="none" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <path d="M340 256 C376 256 392 288 392 312 C392 336 376 368 340 368"
        fill="none" stroke="#F0E8E6" stroke-width="14" stroke-linecap="round"/>

  <!-- 커피 표면 — 라떼아트 느낌 -->
  <ellipse cx="248" cy="228" rx="68" ry="14" fill="url(#latte)"/>
  <!-- 라떼아트 하트 암시 (크림 리프) -->
  <path d="M248 222 C240 218 232 220 234 226 C236 230 248 236 248 236 C248 236 260 230 262 226 C264 220 256 218 248 222Z"
        fill="white" opacity="0.35"/>

  <!-- 김(steam) — 2개, 더 크고 과감하게 -->
  <g fill="none" stroke="url(#steam)" stroke-width="5" stroke-linecap="round">
    <path d="M232 192 C232 168 248 162 248 138 C248 114 232 108 232 84"/>
    <path d="M268 188 C268 164 252 158 252 134 C252 110 268 104 268 80"/>
  </g>

  <!-- 스파클 ✦ — 젠지 시그니처 (3개, 다른 크기) -->
  <g fill="white">
    <!-- 큰 스파클 (우상단) -->
    <path d="M400 156 L404 144 L408 156 L420 160 L408 164 L404 176 L400 164 L388 160Z" opacity="0.9"/>
    <!-- 중간 스파클 (좌상단) -->
    <path d="M130 140 L133 132 L136 140 L144 143 L136 146 L133 154 L130 146 L122 143Z" opacity="0.65"/>
    <!-- 작은 스파클 (우측) -->
    <path d="M420 280 L422 274 L424 280 L430 282 L424 284 L422 290 L420 284 L414 282Z" opacity="0.5"/>
  </g>
</svg>
