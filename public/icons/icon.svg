<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 배경 그라데이션: 토마토 코랄 → 딥 코랄 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4807A"/>
      <stop offset="50%" stop-color="#E8554E"/>
      <stop offset="100%" stop-color="#D04440"/>
    </linearGradient>
    <!-- 배경 광택 -->
    <radialGradient id="bgShine" cx="0.3" cy="0.2" r="0.65">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- 컵 그라데이션: 크림 화이트 -->
    <linearGradient id="cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5EEED"/>
    </linearGradient>
    <!-- 컵 미묘한 그림자 -->
    <linearGradient id="cupShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00000000"/>
      <stop offset="100%" stop-color="#00000012"/>
    </linearGradient>
    <!-- 김(steam) — 반투명 화이트 -->
    <linearGradient id="steam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#bgShine)"/>

  <!-- 접시(saucer) — 미니멀 타원 -->
  <ellipse cx="256" cy="370" rx="110" ry="18" fill="white" opacity="0.18"/>
  <ellipse cx="256" cy="366" rx="110" ry="18" fill="white" opacity="0.25"/>

  <!-- 커피 컵 바디 — 둥글고 미니멀 -->
  <rect x="172" y="210" width="168" height="156" rx="28" fill="url(#cup)"/>
  <rect x="172" y="210" width="168" height="156" rx="28" fill="url(#cupShadow)"/>

  <!-- 컵 좌측 하이라이트 -->
  <rect x="183" y="222" width="32" height="70" rx="16" fill="white" opacity="0.4"/>

  <!-- 컵 핸들 — 깔끔한 C 곡선 -->
  <path d="M340 260 C374 260 388 288 388 306 C388 324 374 352 340 352"
        fill="none" stroke="url(#cup)" stroke-width="20" stroke-linecap="round"/>
  <path d="M340 260 C374 260 388 288 388 306 C388 324 374 352 340 352"
        fill="none" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.5"/>

  <!-- 커피 표면 — 라떼 아트 암시 -->
  <ellipse cx="256" cy="232" rx="60" ry="12" fill="#7C3A30" opacity="0.25"/>
  <ellipse cx="256" cy="232" rx="30" ry="6" fill="white" opacity="0.15"/>

  <!-- 김(steam) — 우아한 S곡선 3개 (젠지 바이브: 얇고 긴) -->
  <g fill="none" stroke="url(#steam)" stroke-width="4.5" stroke-linecap="round">
    <path d="M230 200 C230 180 242 175 242 155 C242 135 230 130 230 110"/>
    <path d="M256 193 C256 171 270 166 270 144 C270 122 256 117 256 95"/>
    <path d="M282 200 C282 180 270 175 270 155 C270 135 282 130 282 110"/>
  </g>

  <!-- 미니멀 선라이즈 — 컵 위 작은 반원 (브랜드 시그니처) -->
  <clipPath id="sunClip">
    <rect x="210" y="140" width="92" height="52"/>
  </clipPath>
  <circle cx="256" cy="192" r="40" fill="white" opacity="0.15" clip-path="url(#sunClip)"/>
</svg>
