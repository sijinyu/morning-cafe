<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 배경: 코랄 그라데이션 -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#F7908B"/>
      <stop offset="45%" stop-color="#E8554E"/>
      <stop offset="100%" stop-color="#C43D38"/>
    </linearGradient>
    <!-- 상단 글로우 -->
    <radialGradient id="glow" cx="0.35" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- 김(steam) -->
    <linearGradient id="steam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- 커피 머그컵 = M 레터마크 착시 -->
  <!-- 왼쪽 다리 (M의 좌측) -->
  <rect x="100" y="170" width="52" height="230" rx="26" fill="white"/>
  <!-- 오른쪽 다리 (M의 우측, 핸들 연결부) -->
  <rect x="280" y="170" width="52" height="230" rx="26" fill="white"/>
  <!-- 하단 연결 (컵 바닥) -->
  <rect x="100" y="348" width="232" height="52" rx="26" fill="white"/>
  <!-- V자 중앙 (M의 중앙 골짜기 = 컵 안쪽) -->
  <path d="M152 170 L216 310 L280 170"
        fill="none" stroke="white" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 핸들 — C 곡선 (컵 오른쪽) -->
  <path d="M332 220 C400 220 400 340 332 340"
        fill="none" stroke="white" stroke-width="44" stroke-linecap="round"/>

  <!-- 커피 표면 힌트 — M 안쪽 어두운 선 -->
  <line x1="140" y1="210" x2="290" y2="210"
        stroke="#C43D38" stroke-width="6" stroke-linecap="round" opacity="0.3"/>

  <!-- 김(steam) — 가늘고 우아하게 -->
  <g fill="none" stroke="url(#steam)" stroke-width="5" stroke-linecap="round">
    <path d="M180 158 C180 138 194 133 194 113 C194 93 180 88 180 68"/>
    <path d="M222 150 C222 130 208 125 208 105 C208 85 222 80 222 60"/>
  </g>

  <!-- 스파클 -->
  <path d="M410 140 L413 130 L416 140 L426 143 L416 146 L413 156 L410 146 L400 143Z" fill="white" opacity="0.8"/>
  <path d="M380 290 L382 284 L384 290 L390 292 L384 294 L382 300 L380 294 L374 292Z" fill="white" opacity="0.5"/>
</svg>
